version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: oficina-postgres
    environment:
      POSTGRES_DB: oficina_mecanica
      POSTGRES_USER: oficina
      POSTGRES_PASSWORD: oficina123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oficina -d oficina_mecanica"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: oficina-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/oficina_mecanica
      DB_USERNAME: oficina
      DB_PASSWORD: oficina123
      JWT_SECRET: oficinaMecanicaSecretKeyForJWTTokenGeneration2024
      JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres-data:
