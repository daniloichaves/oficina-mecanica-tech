spring:
  application:
    name: oficina-mecanica
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/oficina_mecanica}
    username: ${DB_USERNAME:oficina}
    password: ${DB_PASSWORD:oficina123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  security:
    jwt:
      secret: ${JWT_SECRET:oficinaMecanicaSecretKeyForJWTTokenGeneration2024}
      expiration: ${JWT_EXPIRATION:86400000}

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
